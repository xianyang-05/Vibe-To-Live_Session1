</div>
<!-- Main Content Container (Right side on desktop) -->
<main class="relative z-20 w-full lg:w-1/2 max-w-md lg:max-w-lg mx-auto px-margin py-xl flex flex-col min-h-screen justify-center">
<!-- Header & Logo -->
<header class="mb-lg text-center md:text-left">
<div class="flex items-center justify-center md:justify-start mb-sm">
<span class="text-primary-container font-headline-lg font-black tracking-widest uppercase">DailyFit</span>
</div>
<h1 class="font-headline-lg text-primary text-white leading-tight">Elevate Your <br/><span class="text-primary-container">Performance</span></h1>
<p class="font-body-md text-on-surface-variant mt-xs opacity-80">The data-driven sanctuary for serious athletes.</p>
</header>
<!-- Authentication Form -->
<section class="glass-panel p-lg rounded-xl">
<form action="#" class="space-y-md" id="signin-form">
    <!-- Email Field -->
    <div class="space-y-xs">
    <label class="font-label-caps text-on-surface-variant block" for="email">EMAIL ADDRESS</label>
    <div class="relative group">
    <span class="material-symbols-outlined absolute left-base top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors">mail</span>
    <input class="w-full bg-surface-container border border-white/10 rounded-lg py-sm pl-xl pr-base focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none text-white placeholder:text-white/20 font-body-md" id="email" placeholder="athlete@dailyfit.io" type="email"/>
    </div>
    </div>
    <!-- Password Field -->
    <div class="space-y-xs">
    <div class="flex justify-between items-center">
    <label class="font-label-caps text-on-surface-variant block" for="password">PASSWORD</label>
    <a class="font-label-caps text-primary-container hover:underline transition-all" href="#">FORGOT?</a>
    </div>
    <div class="relative group">
    <span class="material-symbols-outlined absolute left-base top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors">lock</span>
    <input class="w-full bg-surface-container border border-white/10 rounded-lg py-sm pl-xl pr-base focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none text-white placeholder:text-white/20 font-body-md" id="password" placeholder="••••••••" type="password"/>
    </div>
    </div>
    <!-- Primary Action Buttons -->
    <div class="flex flex-col gap-sm">
      <button id="signin-btn" class="w-full bg-primary-container text-on-primary-fixed py-sm rounded-lg font-headline-md font-bold tracking-tight hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-base" type="button">
          Sign In
          <span class="material-symbols-outlined" data-weight="fill">arrow_forward</span>
      </button>
      <button id="signup-redirect-btn" class="w-full bg-white/5 text-white border border-white/10 py-sm rounded-lg font-headline-md font-bold tracking-tight hover:bg-white/10 active:scale-[0.98] transition-all flex items-center justify-center gap-base" type="button">
          Create Account
          <span class="material-symbols-outlined">person_add</span>
      </button>
    </div>
    <script type="module">
    import { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from './firebase-config.js';

    // Redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = 'dashboard.html';
      }
    });

    const signinBtn = document.getElementById('signin-btn');
    const signupRedirectBtn = document.getElementById('signup-redirect-btn');

    async function handleSignIn() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        alert("Please enter both email and password.");
        return;
      }

      signinBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> SIGNING IN...`;
      signinBtn.disabled = true;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (error) {
        alert("Sign In Error: " + error.message);
        signinBtn.disabled = false;
        signinBtn.innerHTML = `Sign In <span class="material-symbols-outlined" data-weight="fill">arrow_forward</span>`;
      }
    }

    signinBtn.addEventListener('click', handleSignIn);
    
    signupRedirectBtn.addEventListener('click', () => {
      window.location.href = 'signup.html';
    });
    
    // Also handle Enter key in the form
    document.getElementById('signin-form').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        handleSignIn();
      }
    });
  </script>
</form>
