<body class="bg-background text-on-surface font-body-md min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- Desktop Split Layout -->
<div class="flex min-h-screen">
<!-- Hero Background Section (Left side on desktop) -->
<div class="hidden lg:block lg:w-1/2 relative">
<div class="absolute inset-0 bg-gradient-to-r from-black/20 via-transparent to-black z-10"></div>
<img class="w-full h-full object-cover" alt="Athlete training" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFCPKLF1LBMZMiIakRZUenqU7Ba-YazScbMn3phCKkmrVq3XalOm2XD8RGvRzRPW47cTKur0gpMk4YNtwRIMOcwuCfqTq5vHfInIq3U0mtDRQ0dhxTqVvBw_iJjYpGfJXm_8Z7vLF7hdep5Is3r3GXazW2xSz9H54fvy2OsfWI1HMvqdy8FtlDoeiGsuA1sop9dXFdQXiY0JqEgFTO8UezM8jyuTy5AHCQWiONa-f2YvEbH4Wo6TDbZZqIfcvMIFDzYduOx4T-JR9C"/>
</div>
<!-- Mobile background -->
<div class="fixed inset-0 z-0 lg:hidden">
<div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent z-10"></div>
<img class="w-full h-full object-cover" alt="Athlete training" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFCPKLF1LBMZMiIakRZUenqU7Ba-YazScbMn3phCKkmrVq3XalOm2XD8RGvRzRPW47cTKur0gpMk4YNtwRIMOcwuCfqTq5vHfInIq3U0mtDRQ0dhxTqVvBw_iJjYpGfJXm_8Z7vLF7hdep5Is3r3GXazW2xSz9H54fvy2OsfWI1HMvqdy8FtlDoeiGsuA1sop9dXFdQXiY0JqEgFTO8UezM8jyuTy5AHCQWiONa-f2YvEbH4Wo6TDbZZqIfcvMIFDzYduOx4T-JR9C"/>
</div>
<!-- Main Content Container -->
<main class="relative z-20 w-full lg:w-1/2 max-w-md lg:max-w-lg mx-auto px-margin py-xl flex flex-col min-h-screen justify-center">
<header class="mb-lg text-center md:text-left">
<div class="flex items-center justify-center md:justify-start mb-sm">
<span class="text-primary-container font-headline-lg font-black tracking-widest uppercase">DailyFit</span>
</div>
<h1 class="font-headline-lg text-primary text-white leading-tight">Start Your <br/><span class="text-primary-container">Journey</span></h1>
<p class="font-body-md text-on-surface-variant mt-xs opacity-80">Join the elite community of data-driven athletes.</p>
</header>

<section class="glass-panel p-lg rounded-xl">
<form action="#" class="space-y-md" id="signup-form">
    <!-- Name Field -->
    <div class="space-y-xs">
    <label class="font-label-caps text-on-surface-variant block" for="fullname">FULL NAME</label>
    <div class="relative group">
    <span class="material-symbols-outlined absolute left-base top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors">person</span>
    <input class="w-full bg-surface-container border border-white/10 rounded-lg py-sm pl-xl pr-base focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none text-white placeholder:text-white/20 font-body-md" id="fullname" placeholder="John Doe" type="text"/>
    </div>
    </div>
    <!-- Email Field -->
    <div class="space-y-xs">
    <label class="font-label-caps text-on-surface-variant block" for="email">EMAIL ADDRESS</label>
    <div class="relative group">
    <span class="material-symbols-outlined absolute left-base top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors">mail</span>
    <input class="w-full bg-surface-container border border-white/10 rounded-lg py-sm pl-xl pr-base focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none text-white placeholder:text-white/20 font-body-md" id="email" placeholder="athlete@dailyfit.io" type="email"/>
    </div>
    </div>
    <!-- Password Field -->
    <div class="space-y-xs">
    <label class="font-label-caps text-on-surface-variant block" for="password">PASSWORD</label>
    <div class="relative group">
    <span class="material-symbols-outlined absolute left-base top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors">lock</span>
    <input class="w-full bg-surface-container border border-white/10 rounded-lg py-sm pl-xl pr-base focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none text-white placeholder:text-white/20 font-body-md" id="password" placeholder="••••••••" type="password"/>
    </div>
    </div>

    <button id="create-btn" class="w-full bg-primary-container text-on-primary-fixed py-sm rounded-lg font-headline-md font-bold tracking-tight hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-base" type="button">
        Create Account
        <span class="material-symbols-outlined" data-weight="fill">person_add</span>
    </button>

    <script type="module">
    import { auth, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile } from './firebase-config.js';

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = 'dashboard.html';
      }
    });

    const createBtn = document.getElementById('create-btn');

    createBtn.addEventListener('click', async () => {
      const fullname = document.getElementById('fullname').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!fullname || !email || !password) {
        alert("Please fill in all fields.");
        return;
      }

      createBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> CREATING ACCOUNT...';
      createBtn.disabled = true;

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        // Update display name
        await updateProfile(userCredential.user, {
          displayName: fullname
        });
        
        window.location.href = 'dashboard.html';
      } catch (error) {
        alert("Registration Error: " + error.message);
        createBtn.disabled = false;
        createBtn.innerHTML = 'Create Account <span class="material-symbols-outlined" data-weight="fill">person_add</span>';
      }
    });
  </script>
</form>
</section>

<footer class="mt-lg text-center space-y-md">
<p class="font-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary-container font-bold hover:underline" href="index.html">Sign In</a>
</p>
</footer>
</main>
</div>
</body></html>
